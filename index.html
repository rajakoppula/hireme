    <style>

        body { font-family: 'Inter', sans-serif; background-color: #111827; }
        .timeline-line { position: absolute; left: 50%; transform: translateX(-50%); top: 0; bottom: 0; width: 4px; background-color: #374151; }

    <script>
        // Defensive JS: attach handlers after DOM ready, check for missing dependencies
        document.addEventListener("DOMContentLoaded", () => {
            // Fade-in observer (unchanged)
            const sections = document.querySelectorAll('.fade-in-section');
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('is-visible');
                    }
                });
            }, { threshold: 0.1 });
            sections.forEach(section => observer.observe(section));

            // Download PDF: attach event handler defensively
            const downloadBtn = document.getElementById('download-btn');
            if (downloadBtn) {
                downloadBtn.addEventListener('click', () => {
                    // hide UI that shouldn't appear in PDF
                    downloadBtn.style.display = 'none';
                    const backToTopBtn = document.getElementById('back-to-top');
                    if (backToTopBtn) backToTopBtn.classList.remove('show');

                    const element = document.getElementById('resume-container');
                    const opt = {
                        margin:       [0.5, 0.2, 0.5, 0.2],
                        filename:     'Raja_Koppula_Resume.pdf',
                        image:        { type: 'jpeg', quality: 0.98 },
                        html2canvas:  { scale: 2, useCORS: true, allowTaint: false },
                        jsPDF:        { unit: 'in', format: 'letter', orientation: 'portrait' }
                    };

                    // check if html2pdf is loaded
                    if (typeof html2pdf === 'undefined') {
                        console.error('html2pdf not loaded — check CDN or network.');
                        // restore the button so user can try again
                        downloadBtn.style.display = 'inline-flex';
                        alert('PDF generator not available. Try reloading the page.');
                        return;
                    }

                    html2pdf().set(opt).from(element).save().then(() => {
                        downloadBtn.style.display = 'inline-flex';
                    }).catch((err) => {
                        console.error('Error creating PDF:', err);
                        downloadBtn.style.display = 'inline-flex';
                        alert('Failed to generate PDF. Check console for details.');
                    });
                });
            }

            // Case study toggles — defensive
            window.toggleCaseStudy = function(caseStudyId, readMoreId) {
                const details = document.getElementById(caseStudyId);
                const readMore = document.getElementById(readMoreId);
                if (!details || !readMore) return;
                const icon = readMore.querySelector('i');
                if (details.style.maxHeight) {
                    details.style.maxHeight = null;
                    if (icon) icon.style.transform = 'rotate(0deg)';
                } else {
                    details.style.maxHeight = details.scrollHeight + "px";
                    if (icon) icon.style.transform = 'rotate(180deg)';
                }
            };

            // Back to top button
            const backToTopButton = document.getElementById('back-to-top');
            if (backToTopButton) {
                window.addEventListener('scroll', () => {
                    if (window.pageYOffset > 300) {
                        backToTopButton.classList.add('show');
                    } else {
                        backToTopButton.classList.remove('show');
                    }
                });
                backToTopButton.addEventListener('click', (e) => {
                    e.preventDefault();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            }
        });
    </script>
